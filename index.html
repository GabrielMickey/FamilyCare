<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabaseUrl = 'https://kvjftcxbendrchkrcdrk.supabase.co';
  const supabaseKey = 'sb_publishable_azAMN84Nxhr_9gqpwo2GRA_vQfld0Kv';
  const supabase = createClient(supabaseUrl, supabaseKey);

  // Estas funções garantem que os botões funcionem:
  window.openModal = (id) => {
    const el = document.getElementById(id);
    if(el) el.classList.add("open");
  };

  window.closeModal = (id) => {
    const el = document.getElementById(id);
    if(el) el.classList.remove("open");
  };

  window.goPage = (page) => {
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    const target = document.getElementById("page-" + page);
    if(target) target.classList.remove("hidden");
    console.log("Navegando para:", page);
  };

  console.log("Sistema Supabase carregado sem erros!");
</script>
