<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Web App conectado ao Supabase</title>
    <!-- Tailwind CSS para um visual moderno sem precisar de arquivos extras -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CDN do SDK do Supabase (Essencial para a conexão) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl p-6 border border-gray-700">
        <!-- Cabeçalho -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold tracking-wide text-indigo-400">⚡ Meu App</h1>
            <span id="status-db" class="text-xs px-2.5 py-1 rounded-full bg-red-500/20 text-red-400 border border-red-500/30">Desconectado</span>
        </div>

        <!-- Formulário de Entrada -->
        <form id="todo-form" class="flex gap-2 mb-6">
            <input 
                type="text" 
                id="todo-input" 
                placeholder="Nova tarefa..." 
                required
                class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition-colors"
            >
            <button 
                type="submit"
                class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors cursor-pointer"
            >
                Adicionar
            </button>
        </form>

        <!-- Lista de Itens -->
        <ul id="todo-list" class="space-y-2 max-h-64 overflow-y-auto pr-1">
            <!-- Os itens do banco vão aparecer aqui dentro -->
            <li class="text-sm text-gray-400 text-center py-4">Carregando tarefas...</li>
        </ul>
    </div>

    <!-- Script de Lógica do App -->
    <script>
        // 1. CONFIGURAÇÃO DO SUPABASE
        // Substitua com as credenciais do seu projeto no Supabase
        const SUPABASE_URL = "SUA_SUPABASE_URL_AQUI";
        const SUPABASE_ANON_KEY = "SUA_SUPABASE_ANON_KEY_AQUI";

        let supabase = null;

        // Inicializa o cliente Supabase se as chaves forem preenchidas
        if (SUPABASE_URL !== "SUA_SUPABASE_URL_AQUI") {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const statusBadge = document.getElementById('status-db');
            statusBadge.innerText = "Supabase Conectado";
            statusBadge.className = "text-xs px-2.5 py-1 rounded-full bg-green-500/20 text-green-400 border border-green-500/30";
        }

        // Elementos do DOM
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');

        // 2. BUSCAR TAREFAS DO BANCO (READ)
        async function fetchTodos() {
            if (!supabase) {
                todoList.innerHTML = `<li class="text-sm text-amber-400 text-center py-4">Configure suas chaves do Supabase no código para testar!</li>`;
                return;
            }

            // Altere 'todos' para o nome da tabela que você criou no Supabase
            const { data, error } = await supabase
                .from('todos')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error('Erro ao buscar dados:', error);
                return;
            }

            renderTodos(data);
        }

        // Renderizar elementos na tela
        function renderTodos(todos) {
            if (todos.length === 0) {
                todoList.innerHTML = `<li class="text-sm text-gray-500 text-center py-4">Nenhuma tarefa encontrada.</li>`;
                return;
            }

            todoList.innerHTML = todos.map(todo => `
                <li class="flex items-center justify-between bg-gray-750 p-3 rounded-lg border border-gray-700/50">
                    <span class="text-sm text-gray-200">${todo.title}</span>
                    <button onclick="deleteTodo(${todo.id})" class="text-xs text-gray-500 hover:text-red-400 transition-colors cursor-pointer">
                        Excluir
                    </button>
                </li>
            `).join('');
        }

        // 3. INSERIR TAREFA NO BANCO (CREATE)
        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = todoInput.value.trim();

            if (!supabase || !title) return;

            const { error } = await supabase
                .from('todos')
                .insert([{ title: title }]);

            if (error) {
                alert('Erro ao salvar tarefa!');
                console.error(error);
            } else {
                todoInput.value = '';
                fetchTodos(); // Atualiza a lista
            }
        });

        // 4. DELETAR TAREFA DO BANCO (DELETE)
        async function deleteTodo(id) {
            if (!supabase) return;

            const { error } = await supabase
                .from('todos')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Erro ao deletar tarefa!');
                console.error(error);
            } else {
                fetchTodos(); // Atualiza a lista
            }
        }

        // Executa ao carregar a página
        fetchTodos();
    </script>
</body>
</html>
