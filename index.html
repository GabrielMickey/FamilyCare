<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plantão Familiar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--surface3:#374151;
  --border:#30363d;--border2:#21262d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#2d9cdb;--accent-dim:rgba(45,156,219,.12);
  --green:#3fb950;--green-dim:rgba(63,185,80,.12);
  --red:#f85149;--red-dim:rgba(248,81,73,.12);
  --yellow:#d29922;--yellow-dim:rgba(210,153,34,.12);
  --purple:#bc8cff;--purple-dim:rgba(188,140,255,.12);
  --orange:#f0883e;--orange-dim:rgba(240,136,62,.12);
  --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* FORMS & BUTTONS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.field select option{background:var(--surface)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3)}
.btn-auto{width:auto}

/* APP SHELL */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:8px}
.sidebar-logo-icon{width:32px;height:32px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)}
.sidebar-logo-text{font-size:13px;font-weight:700;line-height:1.2}
.sidebar-logo-sub{font-size:10px;color:var(--text3)}
.sidebar-patient{margin:12px 0 0;padding:10px 12px;background:var(--surface2);border-radius:var(--radius)}
.sidebar-patient-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);font-weight:600}
.sidebar-patient-name{font-size:13px;font-weight:600;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:600;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:background .12s,color .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);background:var(--surface2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:11px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:var(--text3)}

/* MAIN */
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:5}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}
.page{padding:24px;max-width:1100px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.card-empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);font-weight:600;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.stat-green .stat-value{color:var(--green)}
.stat-blue .stat-value{color:var(--accent)}
.stat-yellow .stat-value{color:var(--yellow)}
.stat-purple .stat-value{color:var(--purple)}
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* TIMELINE */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;padding-bottom:20px}
.tl-dot{position:absolute;left:-23px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
.tl-dot-med{background:var(--accent)}
.tl-dot-vital{background:var(--green)}
.tl-dot-evol{background:var(--purple)}
.tl-dot-shift{background:var(--yellow)}
.tl-time{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.tl-content{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px}
.tl-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tl-type-med{color:var(--accent)}
.tl-type-vital{color:var(--green)}
.tl-type-evol{color:var(--purple)}
.tl-type-shift{color:var(--yellow)}
.tl-text{font-size:13px}
.tl-meta{font-size:11px;color:var(--text3);margin-top:4px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border2);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:var(--accent-dim);color:var(--accent)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-orange{background:var(--orange-dim);color:var(--orange)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-gray{background:var(--surface3);color:var(--text3)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;font-size:18px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* VITALS GRID */
.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.vital-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;text-align:center}
.vital-icon{font-size:18px;margin-bottom:6px}
.vital-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.vital-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* EVOL */
.evol-item{padding:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:10px}
.evol-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.evol-meta{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.evol-author{font-size:11px;color:var(--accent);font-weight:600}
.evol-body{font-size:13px;line-height:1.6;white-space:pre-wrap}
.evol-cat{margin-bottom:6px}

/* SHIFT */
.shift-active{background:var(--green-dim);border:1px solid rgba(63,185,80,.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.shift-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MISC */
.loading{text-align:center;color:var(--text3);padding:40px;font-size:13px}
.tag{display:inline-block;padding:1px 6px;background:var(--surface3);border-radius:4px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;transition:color .12s;font-size:14px}
.delete-btn:hover{color:var(--red)}
.hidden{display:none!important}
.mt-16{margin-top:16px}
.accent-text{color:var(--accent);font-size:12px}

@media(max-width:900px){
  .sidebar{width:56px}
  .sidebar-logo-text,.sidebar-logo-sub,.sidebar-patient,.nav-label,.nav-item span,.user-name,.user-role{display:none}
  .main{margin-left:56px}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .dash-cols{grid-template-columns:1fr}
  .vitals-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app-screen" class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6"/><path d="M12 9v6"/></svg>
        </div>
        <div>
          <div class="sidebar-logo-text">Plantão Familiar</div>
          <div class="sidebar-logo-sub">Acompanhamento</div>
        </div>
      </div>
      <div class="sidebar-patient">
        <div class="sidebar-patient-label">Paciente</div>
        <div class="sidebar-patient-name" id="patient-name">— configurar —</div>

    </div>
    <nav class="sidebar-nav">

        <span>Medicações</span>
        <span class="nav-badge hidden" id="badge-meds">0</span>
      </button>
      <button class="nav-item" onclick="goPage('vitals')" data-page="vitals">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span>Sinais Vitais</span>
      </button>
      <button class="nav-item" onclick="goPage('evolution')" data-page="evolution">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        <span>Evolução</span>
      </button>
      <button class="nav-item" onclick="goPage('shifts')" data-page="shifts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Plantões</span>
      </button>
      <button class="nav-item" onclick="goPage('timeline')" data-page="timeline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2
